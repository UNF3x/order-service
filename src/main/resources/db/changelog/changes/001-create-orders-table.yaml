databaseChangeLog:
  - changeSet:
      id: create-orders-table
      author: unf3x
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false

              - column:
                  name: total_amount
                  type: numeric(19,2)
                  constraints:
                    nullable: false

              - column:
                  name: currency
                  type: varchar(3)
                  constraints:
                    nullable: false

              - column:
                  name: description
                  type: varchar(1000)

              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: deleted_at
                  type: timestamp

              - column:
                  name: version
                  type: bigint
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_orders_user_id
            tableName: orders
            columns:
              - column:
                  name: user_id

        - createIndex:
            indexName: idx_orders_status
            tableName: orders
            columns:
              - column:
                  name: status

        - createIndex:
            indexName: idx_orders_created_at
            tableName: orders
            columns:
              - column:
                  name: created_at

        - createIndex:
            indexName: idx_orders_deleted_at
            tableName: orders
            columns:
              - column:
                  name: deleted_at