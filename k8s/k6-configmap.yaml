apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-scripts
  namespace: order-unf3x
data:
  smoke.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    export const options = {
      vus: 1,
      iterations: 5,
      thresholds: {
        http_req_failed: ['rate<0.01'],
        http_req_duration: ['p(95)<1000'],
      },
    };

    const BASE_URL = __ENV.BASE_URL || 'http://order-service.order-unf3x.svc.cluster.local:8080';

    export default function () {
      const response = http.get(`${BASE_URL}/api/v1/orders?page=0&pageSize=5`);

      check(response, {
        'status is 200': (r) => r.status === 200,
        'response time < 1000ms': (r) => r.timings.duration < 1000,
      });

      sleep(1);
    }

  load.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    export const options = {
      stages: [
        { duration: '20s', target: 5 },
        { duration: '40s', target: 20 },
        { duration: '20s', target: 50 },
        { duration: '20s', target: 0 },
      ],
      thresholds: {
        http_req_failed: ['rate<0.05'],
        http_req_duration: ['p(95)<1500'],
        checks: ['rate>0.95'],
      },
    };

    const BASE_URL = __ENV.BASE_URL || 'http://order-service.order-unf3x.svc.cluster.local:8080';

    export default function () {
      const response = http.get(`${BASE_URL}/api/v1/orders?page=0&pageSize=10`);

      check(response, {
        'status is 200': (r) => r.status === 200,
        'body is not empty': (r) => r.body && r.body.length > 0,
      });

      sleep(1);
    }